<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Essay Eraser</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    font-size: 12pt;
    line-height: 1.5;
    color: #000;
    background: #fff;
    margin: 20px;
  }
  textarea {
    width: 100%;
    height: 150px;
    font-family: Arial, sans-serif;
    font-size: 12pt;
    line-height: 1.5;
    padding: 8px;
  }
  #controls {
    margin: 10px 0;
    padding: 10px 0;
    border-top: 1px solid #000;
    border-bottom: 1px solid #000;
  }
  #controls > * {
    margin-right: 10px;
    margin-bottom: 6px;
  }
  #stage {
    position: relative;
    border: 1px solid #000;
    padding: 10px;
    display: none;
    user-select: none;
  }
  #textLayer {
    white-space: pre-wrap;
    word-wrap: break-word;
    position: relative;
  }
  #coverCanvas {
    position: absolute;
    top: 10px;
    left: 10px;
    cursor: crosshair;
  }
  #lineCanvas {
    position: absolute;
    top: 10px;
    left: 10px;
    pointer-events: none;
  }
  .word, .gap {
    display: inline;
  }
  #resetBtn {
    margin-left: auto;
  }
  label { font-size: 12pt; }
  #highlightControls {
    display: none;
    align-items: center;
  }
  #highlightControls.active {
    display: inline-flex;
  }
  .swatch {
    width: 24px;
    height: 24px;
    border: 2px solid #000;
    border-radius: 3px;
    cursor: pointer;
    padding: 0;
    margin-right: 6px;
  }
  .swatch.selected {
    outline: 2px solid #000;
    outline-offset: 2px;
  }
  #highlightEraserBtn {
    height: 24px;
    margin-right: 10px;
  }
  #highlightEraserBtn.selected {
    outline: 2px solid #000;
    outline-offset: 2px;
  }
  #subModeControls, #wholeUnit {
    display: none;
  }
  #subModeControls.active {
    display: inline-flex;
    align-items: center;
  }
  #wholeUnit.active {
    display: inline;
  }
</style>
</head>
<body>

<h2 style="font-weight:normal;">Essay Eraser</h2>

<textarea id="essayInput" placeholder="Paste your essay here..."></textarea>
<br>
<button id="startBtn">Cover Essay</button>

<div id="controls">
  <label><input type="radio" name="tool" value="reveal" checked> Reveal</label>
  <label><input type="radio" name="tool" value="recover"> Recover</label>
  <label><input type="radio" name="tool" value="highlight"> Highlighter</label>

  <span id="subModeControls">
    <label><input type="radio" name="submode" value="whole" checked> Whole</label>
    <label><input type="radio" name="submode" value="partial"> Partial</label>
  </span>

  <select id="wholeUnit">
    <option value="word">Word at a time</option>
    <option value="sentence">Sentence at a time</option>
  </select>

  <span id="highlightControls">
    <button type="button" class="swatch selected" data-color="rgba(255,0,0,0.45)" style="background:rgba(255,0,0,0.45)" title="Red"></button>
    <button type="button" class="swatch" data-color="rgba(0,120,255,0.45)" style="background:rgba(0,120,255,0.45)" title="Blue"></button>
    <button type="button" class="swatch" data-color="rgba(255,235,0,0.55)" style="background:rgba(255,235,0,0.55)" title="Yellow"></button>
    <button type="button" class="swatch" data-color="rgba(0,190,0,0.45)" style="background:rgba(0,190,0,0.45)" title="Green"></button>
    <button type="button" class="swatch" data-color="rgba(255,140,0,0.5)" style="background:rgba(255,140,0,0.5)" title="Orange"></button>
    <button type="button" class="swatch" data-color="rgba(155,0,200,0.45)" style="background:rgba(155,0,200,0.45)" title="Purple"></button>
    <button type="button" id="highlightEraserBtn">Highlight Eraser</button>
  </span>

  <button id="undoBtn" disabled>Undo</button>
  <button id="redoBtn" disabled>Redo</button>
  <button id="coverAllBtn">Cover All</button>
  <button id="resetBtn">Reset / New Essay</button>
</div>

<div id="stage">
  <div id="textLayer"></div>
  <canvas id="coverCanvas"></canvas>
  <canvas id="lineCanvas"></canvas>
</div>

<script>
const essayInput = document.getElementById('essayInput');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const stage = document.getElementById('stage');
const textLayer = document.getElementById('textLayer');
const coverCanvas = document.getElementById('coverCanvas');
const ctx = coverCanvas.getContext('2d');
const lineCanvas = document.getElementById('lineCanvas');
const lctx = lineCanvas.getContext('2d');
const wholeUnit = document.getElementById('wholeUnit');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const coverAllBtn = document.getElementById('coverAllBtn');
const subModeControls = document.getElementById('subModeControls');
const highlightControls = document.getElementById('highlightControls');
const highlightEraserBtn = document.getElementById('highlightEraserBtn');
const swatches = Array.from(document.querySelectorAll('.swatch'));

let tool = 'reveal';       // 'reveal' | 'recover' | 'highlight'
let subMode = 'whole';     // 'whole' | 'partial' (reveal/recover only)
let drawing = false;
let undoStack = [];
let redoStack = [];
let highlightColor = swatches[0].dataset.color;
let highlightTool = 'color';
let lineHeightPx = 0;

function highlightableEls() {
  return textLayer.querySelectorAll('.word, .gap');
}

function snapshot() {
  return {
    canvas: ctx.getImageData(0, 0, coverCanvas.width, coverCanvas.height),
    highlights: Array.from(highlightableEls()).map(el => el.style.backgroundColor)
  };
}

function restore(state) {
  ctx.putImageData(state.canvas, 0, 0);
  Array.from(highlightableEls()).forEach((el, i) => {
    el.style.backgroundColor = state.highlights[i] || '';
  });
}

function pushUndo() {
  undoStack.push(snapshot());
  redoStack = [];
  updateUndoRedoButtons();
}

function updateUndoRedoButtons() {
  undoBtn.disabled = undoStack.length === 0;
  redoBtn.disabled = redoStack.length === 0;
}

undoBtn.addEventListener('click', () => {
  if (undoStack.length === 0) return;
  redoStack.push(snapshot());
  restore(undoStack.pop());
  updateUndoRedoButtons();
});

redoBtn.addEventListener('click', () => {
  if (redoStack.length === 0) return;
  undoStack.push(snapshot());
  restore(redoStack.pop());
  updateUndoRedoButtons();
});

coverAllBtn.addEventListener('click', () => {
  pushUndo();
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, coverCanvas.width, coverCanvas.height);
});

document.querySelectorAll('input[name="tool"]').forEach(r => {
  r.addEventListener('change', () => {
    tool = document.querySelector('input[name="tool"]:checked').value;
    updateModeUI();
  });
});

document.querySelectorAll('input[name="submode"]').forEach(r => {
  r.addEventListener('change', () => {
    subMode = document.querySelector('input[name="submode"]:checked').value;
    updateModeUI();
  });
});

function updateModeUI() {
  const isRevealOrRecover = tool === 'reveal' || tool === 'recover';
  subModeControls.classList.toggle('active', isRevealOrRecover);
  wholeUnit.classList.toggle('active', isRevealOrRecover && subMode === 'whole');
  highlightControls.classList.toggle('active', tool === 'highlight');
}
updateModeUI();

swatches.forEach(btn => {
  btn.addEventListener('click', () => {
    highlightColor = btn.dataset.color;
    highlightTool = 'color';
    swatches.forEach(s => s.classList.remove('selected'));
    btn.classList.add('selected');
    highlightEraserBtn.classList.remove('selected');
  });
});

highlightEraserBtn.addEventListener('click', () => {
  highlightTool = 'erase';
  swatches.forEach(s => s.classList.remove('selected'));
  highlightEraserBtn.classList.add('selected');
});

startBtn.addEventListener('click', () => {
  const text = essayInput.value;
  if (!text.trim()) return;

  // Build word-wrapped text layer, splitting into spans per word (keep sentence groupings via data attrs)
  textLayer.innerHTML = '';
  buildWordSpans(text);

  essayInput.style.display = 'none';
  startBtn.style.display = 'none';
  stage.style.display = 'block';

  sizeCoverCanvas();
});

function sizeCoverCanvas() {
  const w = textLayer.scrollWidth;
  const h = textLayer.scrollHeight;

  const cs = getComputedStyle(textLayer);
  lineHeightPx = parseFloat(cs.lineHeight);
  if (!lineHeightPx || isNaN(lineHeightPx)) {
    lineHeightPx = parseFloat(cs.fontSize) * 1.5;
  }

  coverCanvas.width = w;
  coverCanvas.height = h;
  coverCanvas.style.width = w + 'px';
  coverCanvas.style.height = h + 'px';
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  lineCanvas.width = w;
  lineCanvas.height = h;
  lineCanvas.style.width = w + 'px';
  lineCanvas.style.height = h + 'px';
  drawRuledLines();

  undoStack = [];
  redoStack = [];
  updateUndoRedoButtons();
}

// Ruled lines - drawn on a separate layer above the cover, never touched by
// reveal/recover/highlight, so they can never be erased or covered over.
function drawRuledLines() {
  const w = lineCanvas.width;
  const h = lineCanvas.height;
  lctx.clearRect(0, 0, w, h);
  lctx.strokeStyle = 'rgba(90,90,150,0.55)';
  lctx.lineWidth = 1;
  for (let y = lineHeightPx; y < h + 0.5; y += lineHeightPx) {
    const ly = Math.round(y) + 0.5;
    lctx.beginPath();
    lctx.moveTo(0, ly);
    lctx.lineTo(w, ly);
    lctx.stroke();
  }
}

// Every word/gap snaps vertically to its full text-line row (using the ruled-line
// grid), not its own bounding rect, so adjacent reveals/covers tile with no gaps.
function getRowRect(el) {
  const canvasRect = coverCanvas.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  const relTop = elRect.top - canvasRect.top;
  const rowIndex = Math.max(0, Math.round(relTop / lineHeightPx));
  return {
    x: elRect.left - canvasRect.left - 0.5,
    y: rowIndex * lineHeightPx,
    width: elRect.width + 1,
    height: lineHeightPx
  };
}

window.addEventListener('resize', () => {
  if (stage.style.display === 'block') sizeCoverCanvas();
});

resetBtn.addEventListener('click', () => {
  stage.style.display = 'none';
  essayInput.style.display = 'block';
  startBtn.style.display = 'inline-block';
  textLayer.innerHTML = '';
});

// Split essay into words, tag each word with a sentence index (newline-aware)
function buildWordSpans(text) {
  const lines = text.split('\n');
  let sIndex = 0;
  lines.forEach((line, li) => {
    if (line.trim() === '') {
      textLayer.appendChild(document.createElement('br'));
      return;
    }
    const parts = line.split(/(?<![Mm]r)(?<![Dd]r)(?<![Mm][ss])(?<![Jj]r)(?<![Ss]r)(\.)\s+(?=[A-Z])/);
    const sentences = [];
    for (let i = 0; i < parts.length; i += 2) {
      if (parts[i].trim()) sentences.push(parts[i] + (parts[i+1] ? parts[i+1] + ' ' : ''));
    }
    sentences.forEach(sentence => {
      if (sentence === '') return;
      const tokens = sentence.split(/(\s+)/);
      tokens.forEach(tok => {
        if (tok === '') return;
        if (/^\s+$/.test(tok)) {
          const gap = document.createElement('span');
          gap.className = 'gap';
          gap.textContent = tok;
          gap.dataset.sentence = sIndex;
          textLayer.appendChild(gap);
        } else {
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = tok;
          span.dataset.sentence = sIndex;
          textLayer.appendChild(span);
        }
      });
      sIndex++;
    });
    if (li < lines.length - 1) textLayer.appendChild(document.createElement('br'));
  });
}

// Paint a single word/gap element according to the active tool. Reveal/recover
// snap to the element's full text-line row (see getRowRect) so a drag across a
// whole paragraph tiles cleanly with no gaps or leftover slivers.
function paintEl(el) {
  if (tool === 'highlight') {
    el.style.backgroundColor = highlightTool === 'erase' ? '' : highlightColor;
    return;
  }
  const r = getRowRect(el);
  if (tool === 'reveal') {
    ctx.clearRect(r.x, r.y, r.width, r.height);
  } else if (tool === 'recover') {
    ctx.fillStyle = '#000';
    ctx.fillRect(r.x, r.y, r.width, r.height);
  }
}

function elementAt(clientX, clientY) {
  coverCanvas.style.pointerEvents = 'none';
  const el = document.elementFromPoint(clientX, clientY);
  coverCanvas.style.pointerEvents = 'auto';
  if (!el || !el.classList) return null;
  if (!el.classList.contains('word') && !el.classList.contains('gap')) return null;
  return el;
}

function paintAt(clientX, clientY) {
  const el = elementAt(clientX, clientY);
  if (el) paintEl(el);
}

// PARTIAL drag (reveal/recover, word-snapped) and HIGHLIGHTER both paint
// continuously on drag; WHOLE reveal/recover paint once per click (below).
function isDragTool() {
  return tool === 'highlight' || ((tool === 'reveal' || tool === 'recover') && subMode === 'partial');
}

coverCanvas.addEventListener('mousedown', (e) => {
  if (!isDragTool()) return;
  drawing = true;
  pushUndo();
  paintAt(e.clientX, e.clientY);
});
coverCanvas.addEventListener('mousemove', (e) => {
  if (!drawing) return;
  paintAt(e.clientX, e.clientY);
});
window.addEventListener('mouseup', () => drawing = false);

coverCanvas.addEventListener('touchstart', (e) => {
  if (!isDragTool()) return;
  const t = e.touches[0];
  drawing = true;
  pushUndo();
  paintAt(t.clientX, t.clientY);
  e.preventDefault();
}, { passive: false });
coverCanvas.addEventListener('touchmove', (e) => {
  if (!drawing) return;
  const t = e.touches[0];
  paintAt(t.clientX, t.clientY);
  e.preventDefault();
}, { passive: false });
coverCanvas.addEventListener('touchend', () => drawing = false);

// WHOLE reveal/recover (word/sentence) - single click
coverCanvas.addEventListener('click', (e) => {
  if (tool === 'highlight') return;
  if (subMode !== 'whole') return;

  const el = elementAt(e.clientX, e.clientY);
  if (!el || !el.classList.contains('word')) return;

  pushUndo();

  const unit = wholeUnit.value;
  if (unit === 'word') {
    paintEl(el);
  } else {
    const sIndex = el.dataset.sentence;
    const sentenceEls = textLayer.querySelectorAll(`.word[data-sentence="${sIndex}"], .gap[data-sentence="${sIndex}"]`);
    sentenceEls.forEach(w => paintEl(w));
  }
});
</script>

</body>
</html>
